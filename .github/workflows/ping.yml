name: Keep Supabase Alive

"on":
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase projects
        shell: bash
        env:
          SUPABASE_URLS: |
            https://hptogvxjoyrpzlriiryv.supabase.co
            https://xeguwajqiodghnensykt.supabase.co
        run: |
          set +e

          echo "Starting Supabase keep-alive pings"

          while IFS= read -r url; do
            if [[ -z "$url" ]]; then
              continue
            fi

            project_host="${url#https://}"
            project_host="${project_host%/}"

            echo "Pinging project: ${project_host}"

            http_code="$(curl --head --silent --show-error \
              --output /dev/null --write-out "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "$url" || echo "000")"

            echo "HTTP status: ${http_code} (${project_host})"
          done <<< "$SUPABASE_URLS"

          echo "Supabase keep-alive pings complete"
          exit 0
