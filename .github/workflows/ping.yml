name: Keep Supabase Alive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase projects
        shell: bash
        run: |
          set +e

          urls=(
            "https://hptogvxjoyrpzlriiryv.supabase.co"
            "https://xeguwajqiodghnensykt.supabase.co"
          )

          for url in "${urls[@]}"; do
            http_code=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "$url" || true)
            echo "Pinged $url -> HTTP $http_code"
          done
